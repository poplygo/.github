<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Poplygo: anonymous Q and A and instant polls everyone actually joins">
  <!-- panel -->
  <rect x="6" y="6" width="1188" height="328" rx="22" fill="#ffffff" stroke="#111111" stroke-width="3"/>

  <!-- faint grid -->
  <g stroke="#e9edf2" stroke-width="1">
    <line x1="46" y1="9" x2="46" y2="331"/><line x1="126" y1="9" x2="126" y2="331"/><line x1="206" y1="9" x2="206" y2="331"/><line x1="286" y1="9" x2="286" y2="331"/><line x1="366" y1="9" x2="366" y2="331"/><line x1="446" y1="9" x2="446" y2="331"/><line x1="526" y1="9" x2="526" y2="331"/><line x1="606" y1="9" x2="606" y2="331"/><line x1="686" y1="9" x2="686" y2="331"/><line x1="766" y1="9" x2="766" y2="331"/><line x1="846" y1="9" x2="846" y2="331"/><line x1="926" y1="9" x2="926" y2="331"/><line x1="1006" y1="9" x2="1006" y2="331"/><line x1="1086" y1="9" x2="1086" y2="331"/><line x1="1166" y1="9" x2="1166" y2="331"/>
    <line x1="9" y1="49" x2="1191" y2="49"/><line x1="9" y1="89" x2="1191" y2="89"/><line x1="9" y1="129" x2="1191" y2="129"/><line x1="9" y1="169" x2="1191" y2="169"/><line x1="9" y1="209" x2="1191" y2="209"/><line x1="9" y1="249" x2="1191" y2="249"/><line x1="9" y1="289" x2="1191" y2="289"/>
  </g>

  <!-- top ruler ticks -->
  <g stroke="#c9d2db" stroke-width="1" font-family="'JetBrains Mono',monospace" font-size="9" fill="#aab4bf">
    <line x1="6" y1="34" x2="1194" y2="34"/>
    <text x="120" y="26">200</text><line x1="120" y1="28" x2="120" y2="34"/>
    <text x="420" y="26">500</text><line x1="420" y1="28" x2="420" y2="34"/>
    <text x="720" y="26">800</text><line x1="720" y1="28" x2="720" y2="34"/>
    <text x="1020" y="26">1100</text><line x1="1020" y1="28" x2="1020" y2="34"/>
  </g>

  <!-- clock -->
  <text x="600" y="80" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="15" fill="#ff4d87" letter-spacing="1">11:54:05 PM</text>

  <!-- say hello to -->
  <text x="600" y="120" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="20" fill="#2b2b2b">say hello to</text>

  <!-- wordmark -->
  <text x="592" y="205" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="94" font-weight="800" fill="#111111" letter-spacing="6">POPLYGO</text>

  <!-- LIVE NOW pill (offset shadow copy, then pill) -->
  <rect x="945" y="183" width="150" height="42" rx="21" fill="#111111"/>
  <g transform="translate(940,178)">
    <rect x="0" y="0" width="150" height="42" rx="21" fill="#ff4d87" stroke="#111111" stroke-width="3"/>
    <circle cx="28" cy="21" r="6" fill="#ffffff"><animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/></circle>
    <text x="92" y="28" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="16" font-weight="800" fill="#ffffff" letter-spacing="1">LIVE NOW</text>
  </g>

  <!-- tagline -->
  <text x="600" y="252" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="19" fill="#20242a">Run anonymous Q&amp;A and instant polls everyone actually joins.</text>
  <text x="600" y="280" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="19" fill="#20242a">Up and running in seconds. Free, no signup.</text>

  <!-- green bubble (shadow, then bubble) -->
  <rect x="65" y="75" width="230" height="46" rx="12" fill="#111111"/>
  <path d="M97 121 L87 143 L117 121 Z" fill="#111111"/>
  <rect x="60" y="70" width="230" height="46" rx="12" fill="#b7f5c9" stroke="#111111" stroke-width="3"/>
  <path d="M92 116 L82 138 L112 116 Z" fill="#b7f5c9" stroke="#111111" stroke-width="3"/>
  <text x="175" y="99" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#111111">1,200+ sessions hosted</text>

  <!-- pink bubble -->
  <rect x="910" y="93" width="210" height="46" rx="12" fill="#111111"/>
  <path d="M1085 139 L1101 159 L1055 139 Z" fill="#111111"/>
  <rect x="905" y="88" width="210" height="46" rx="12" fill="#ffc2d4" stroke="#111111" stroke-width="3"/>
  <path d="M1080 134 L1096 154 L1050 134 Z" fill="#ffc2d4" stroke="#111111" stroke-width="3"/>
  <text x="1010" y="117" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#111111">100% free, forever</text>

  <!-- blue bubble -->
  <rect x="75" y="237" width="215" height="46" rx="12" fill="#111111"/>
  <path d="M109 283 L99 305 L129 283 Z" fill="#111111"/>
  <rect x="70" y="232" width="215" height="46" rx="12" fill="#bfe3ff" stroke="#111111" stroke-width="3"/>
  <path d="M104 278 L94 300 L124 278 Z" fill="#bfe3ff" stroke="#111111" stroke-width="3"/>
  <text x="177" y="261" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#111111">no signup, any device</text>

  <!-- floating dot -->
  <circle cx="1120" cy="60" r="7" fill="#ff4d87"><animate attributeName="cy" values="60;50;60" dur="3s" repeatCount="indefinite"/></circle>
</svg>
